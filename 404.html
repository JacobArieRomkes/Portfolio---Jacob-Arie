<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f9fafb">
  <title>Pagina niet gevonden | Jacob Arie</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <!-- Deze pagina is bewust zelfvoorzienend: een 404 wordt op elk willekeurig
       pad geserveerd, dus relatieve paden naar css/assets zijn niet betrouwbaar. -->
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }

    html {
      color-scheme: light;
    }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      color: #111827;
      background-color: #f9fafb;
    }

    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 16px;
    }

    .error-code {
      font-family: 'Sora', sans-serif;
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 700;
      line-height: 1;
      color: #dcfce7;
      -webkit-text-stroke: 2px #166534;
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 16px;
    }

    p {
      margin-top: 8px;
      max-width: 42ch;
      color: #4b5563;
    }

    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 24px;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      color: #004b1e;
      background-color: #22c55e;
      border-radius: 0.5rem;
      transition: background-color 150ms ease;
    }

    .btn:hover {
      background-color: #4ade80;
    }

    :focus-visible {
      outline: 2px solid #22c55e;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main id="main">
    <div class="error-page">
      <span class="error-code" aria-hidden="true">404</span>
      <h1>Deze pagina is niet gevonden</h1>
      <p>De pagina die je zoekt bestaat niet (meer), of er zit een typfout in het adres. Via de homepagina vind je alles terug.</p>
      <a class="btn" href="/">Naar de homepagina</a>
    </div>
  </main>
</body>
</html>
